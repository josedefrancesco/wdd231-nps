<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NPS Park Page</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/main.js"></script>
</head>
<body>
    <p class="disclaimer">
        This is not a real NPS website. Visit <a href="#" class="park-name">[Park Name]</a>
    </p>

    <header>
        <section class="global-header">
            <a href="index.html" class="site-title">
                <span class="logo" role="presentation"></span>
                <h1>National Park Service</h1>
            </a>
            <div class="global-header__right">
                <a class="search-icon" href="#park-footer">
                    <svg class="icon"><use xlink:href="/images/sprite.symbol.svg#search"></use></svg>
                    <span class="visually-hidden">Search</span>
                </a>
                
                <button 
                    id="global-nav-toggle" 
                    class="global-nav__toggle"
                    aria-expanded="false" 
                    aria-label="Open Menu"
                >
                    <div class="global-nav__toggle--closed">
                        <svg class="icon"><use xlink:href="/images/sprite.symbol.svg#menu"></use></svg>
                        <span class="visually-hidden">Open</span> Menu
                    </div>
                    <div class="global-nav__toggle--open">
                        <svg class="icon"><use xlink:href="/images/sprite.symbol.svg#close"></use></svg>
                        Close
                    </div>
                </button>
            </div>
        </section>

        <nav class="global-nav">
            <h2 class="global-nav__section-heading">Explore the National Park Service</h2>
            <ul class="global-nav__list">
                <li>
                    <div class="global-nav__split-button">
                        <a href="#">Plan Your Visit</a>
                        <button class="global-nav__split-button__toggle">
                            <span class="visually-hidden">Toggle submenu for Plan Your Visit</span>
                            <svg class="icon" role="presentation" focusable="false">
                                <use xlink:href="/images/sprite.symbol.svg#arrow"></use>
                            </svg>
                        </button>
                    </div>
                    </li>
            </ul>
        </nav>

        <section id="park-header">
            <div class="hero-banner">
                <img src="" alt="" />
                <div class="hero-banner__content">
                    <h2 class="park-name"></h2>
                </div>
            </div>
            <nav class="park-nav">
                <ul>
                    <li><a href="#"><span>Info</span><svg class="icon"><use xlink:href="/images/sprite.symbol.svg#info"></use></svg></a></li>
                    <li><a href="#"><span>Alerts</span><svg class="icon"><use xlink:href="/images/sprite.symbol.svg#alert"></use></svg></a></li>
                    <li><a href="#"><span>Maps</span><svg class="icon"><use xlink:href="/images/sprite.symbol.svg#location"></use></svg></a></li>
                    <li><a href="#"><span>Calendar</span><svg class="icon"><use xlink:href="/images/sprite.symbol.svg#calendar"></use></svg></a></li>
                    <li><a href="#"><span>Fees</span><svg class="icon"><use xlink:href="/images/sprite.symbol.svg#fee-22"></use></svg></a></li>
                </ul>
            </nav>
        </section>
    </header>

    <main id="main">
        <section class="intro"></section>
        <section class="info info-container"></section>
    </main>

    <footer id="park-footer"></footer>
</body>
</html>
